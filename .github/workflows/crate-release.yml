# SPDX-License-Identifier: Apache-2.0
#
# Publishes the Rust engine crate `gbif-name-parser` (crates/nameparser) to crates.io via
# Trusted Publishing (OIDC) — no API token is stored anywhere in this repo. Only the engine
# crate is a library; nameparser-cli / -ffi / -py stay `publish = false`.
#
# This workflow is ONLY for the crates.io engine. CLI -> GitHub Releases (cli-release.yml),
# Python -> PyPI (python-release.yml), Java FFM binding -> Jenkins, R -> CRAN. See DISTRIBUTION.md.
#
# Release flow:
#   1. Make sure the engine version (root Cargo.toml [workspace.package] version) is the intended
#      release version (scripts/bump-version.sh sets it).
#   2. Tag and push:  git tag crate-v0.1.0 && git push origin crate-v0.1.0
#   3. This authenticates via OIDC and runs `cargo publish -p gbif-name-parser`.
# A manual run (workflow_dispatch) does a `cargo publish --dry-run` only — it never publishes.
#
# ONE-TIME crates.io setup (Trusted Publishing — no token/secret stored anywhere):
#   * On https://crates.io, open the `gbif-name-parser` crate -> Settings -> Trusted Publishing
#     -> Add, with: repository owner `gbif`, repository name `name-parser-rust`, workflow
#     filename `crate-release.yml`, environment `crates-io`. (For the very first publish, the
#     crate must exist first: either publish it once manually, or crates.io's pending-publisher
#     flow — see their Trusted Publishing docs.)
#   * The `crates-io` environment already exists in this repo's Settings -> Environments (gated
#     behind a required reviewer, so each publish pauses for manual approval).

name: Publish crate

on:
  push:
    tags:
      - 'crate-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish gbif-name-parser to crates.io
    # Only publish on a crate-v* tag; a manual (workflow_dispatch) run does a dry-run job instead.
    if: startsWith(github.ref, 'refs/tags/crate-v')
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write   # Trusted Publishing (OIDC) — no crates.io token/secret needed
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Guard — tag must match the engine version (crates.io uploads are irreversible)
        run: |
          ver=$(grep -A5 '^\[workspace.package\]' Cargo.toml | grep -m1 '^version' | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "${GITHUB_REF_NAME}" != "crate-v${ver}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != crate-v${ver} (root Cargo.toml [workspace.package] version). Bump the version to match the tag before releasing."
            exit 1
          fi
          echo "tag ${GITHUB_REF_NAME} matches engine version ${ver}"
      - name: Authenticate to crates.io (Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish
        run: cargo publish -p gbif-name-parser
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  dry-run:
    name: Dry-run (cargo publish --dry-run)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Package + verify without publishing
        run: cargo publish --dry-run -p gbif-name-parser
