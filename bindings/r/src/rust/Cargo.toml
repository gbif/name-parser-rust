[package]
name = "nameparser"
# Aligned with the core crate (scientific-name-parser 0.1.0) and DESCRIPTION's Version: 0.1.0.
# (The lockfile-collision that once forced a distinct version is gone: the core was renamed
# from `nameparser` 0.0.0 to `scientific-name-parser`, so no (name, version) clash remains.
# This crate's lib target still keeps the short name `nameparser` for R's useDynLib.)
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ['staticlib', 'lib']
name = 'nameparser'

# Generated by `rextendr::use_extendr()`: a small helper binary that (via the metadata
# `extendr_module!` embeds in the lib target) regenerates ../R/extendr-wrappers.R at
# build time. Invoked by src/Makevars.in as `cargo run --bin document ...` on every
# build, so this target must stay declared even though Task 1's brief Cargo.toml
# (written before this repo's toolchain spike ran) omitted it â€” dropping it breaks
# `rextendr::document()`/`devtools::document()` (see Task 1 report: rextendr 0.5.0's
# `document()`/`register_extendr()` are deprecated no-ops that delegate to
# `devtools::document()`, which drives wrapper regeneration through this exact Makevars
# recipe, not through any roxygen2 roclet).
[[bin]]
name = 'document'
path = 'document.rs'

[dependencies]
extendr-api = "0.9"
serde_json = "1"
# Needed directly (not just transitively via serde_json) because `enum_name`'s bound is
# `T: serde::Serialize` â€” `serde_json::to_value` alone doesn't re-export the `Serialize`
# trait at a `serde_json::` path. No `derive` feature: this crate only reads the core's
# already-`Serialize` enums, it never derives `Serialize` on a type of its own.
serde = "1"
# The core parser crate. Its package is `scientific-name-parser` (renamed for
# publication) but its lib target is still named `nameparser`. This binding aliases it
# to `nameparser_core` (Cargo's `package =` rename) so lib.rs refers to it as
# `::nameparser_core::...`. The alias is REQUIRED here (unlike the PyO3 binding, which can
# key the same core plainly): this package also has a generated `[[bin]] document` target
# that Cargo auto-links against this package's OWN `[lib]`, itself named `nameparser`
# (required for R's `useDynLib(nameparser)`). Selecting the core by its own lib name would
# bind two different `.rlib`s to the extern name `nameparser` in that bin â€” rustc's
# `error[E0464]: multiple candidates for `rlib` dependency `nameparser``, which (unlike
# lib.rs's own-name ambiguity E0659 that a leading `::` fixes) is only resolvable by giving
# the core a distinct extern name, i.e. this alias.
nameparser_core = { package = "scientific-name-parser", path = "../../../../crates/nameparser" }

# Detach from the repo's Cargo workspace so R's Makevars can build this crate
# standalone (the root workspace lists only crates/* as members).
[workspace]
